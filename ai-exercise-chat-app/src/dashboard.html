<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Exercise Chat System</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            margin: 0 0 8px;
            font-size: 14px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }

        .conversations-list {
            margin-top: 24px;
        }

        .conversation-item {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .conversation-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(59, 91, 253, 0.15);
        }

        .conversation-item h4 {
            margin: 0 0 8px;
            color: var(--primary);
        }

        .conversation-item small {
            color: var(--muted);
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }

        .progress-chart {
            margin-top: 24px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .chart-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
        }

        .chart-label {
            width: 100px;
            font-size: 13px;
            font-weight: 500;
        }

        .chart-bar {
            flex: 1;
            height: 24px;
            background: #f0f4ff;
            border-radius: 4px;
            overflow: hidden;
        }

        .chart-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            color: white;
            font-size: 11px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="header-bar">
            <div class="header-content">
                <h1>Dashboard</h1>
                <p class="subtitle">Track your fitness progress</p>
            </div>
            <nav class="header-nav">
                <a href="index.html" class="nav-link">Chat</a>
                <a href="dashboard.html" class="nav-link active">Dashboard</a>
                <a href="settings.html" class="nav-link">Settings</a>
                <button id="logoutBtn" class="nav-btn">Logout</button>
            </nav>
        </header>

        <main style="padding: 20px; flex: 1;">
            <div class="dashboard-grid" id="statsGrid">
                <div class="stat-card">
                    <h3>Total Workouts</h3>
                    <div class="value" id="totalWorkouts">0</div>
                </div>
                <div class="stat-card">
                    <h3>Current BMI</h3>
                    <div class="value" id="currentBMI">--</div>
                </div>
                <div class="stat-card">
                    <h3>Weight Change</h3>
                    <div class="value" id="weightChange">--</div>
                </div>
                <div class="stat-card">
                    <h3>Goal</h3>
                    <div class="value" id="mainGoal">--</div>
                </div>
            </div>

            <div class="conversations-list">
                <h2>Your Conversations</h2>
                <div id="conversationsList" class="loading">Loading...</div>
            </div>

            <div class="progress-chart">
                <h2>Progress Timeline</h2>
                <div id="progressTimeline"></div>
            </div>
        </main>

        <footer>
            <small>Data is encrypted and private.</small>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/supabase-config.js"></script>
    <script src="scripts/dashboard.js"></script>
</body>
</html>
